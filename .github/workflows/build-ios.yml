name: Build iOS App (SFI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    name: Build SFI for iOS
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      # --- Checkout проекта ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Xcode ---
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      # --- Go ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # --- Клонируем sing-box ОДИН раз ---
      - name: Clone sing-box
        run: |
          set -e
          git clone --depth 1 https://github.com/SagerNet/sing-box.git /tmp/sing-box

      # --- Получаем SHA локально ---
      - name: Get sing-box SHA
        id: singbox
        run: |
          cd /tmp/sing-box
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "Using sing-box commit: $(git rev-parse --short HEAD)"

      # --- Кеш xcframework ---
      - name: Cache Libbox.xcframework
        id: cache-libbox
        uses: actions/cache@v4
        with:
          path: Libbox.xcframework
          key: libbox-${{ runner.os }}-go1.23-${{ steps.singbox.outputs.sha }}
          restore-keys: |
            libbox-${{ runner.os }}-

      # --- Сборка libbox ---
      - name: Build Libbox.xcframework
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        run: |
          set -e

          cd /tmp/sing-box

          export PATH="$(go env GOPATH)/bin:$PATH"

          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.11

          gomobile init

          go run ./cmd/internal/build_libbox -target apple -platform ios,iossimulator

          cp -R Libbox.xcframework "$GITHUB_WORKSPACE/"

      # --- Проверка ---
      - name: Verify Libbox
        run: |
          test -d Libbox.xcframework || (echo "Libbox missing" && exit 1)

      # --- Build dir ---
      - name: Create build dir
        run: mkdir -p build

      # --- Кеш архива ---
      - name: Cache xcarchive
        id: cache-archive
        uses: actions/cache@v4
        with:
          path: build/SFI.xcarchive
          key: archive-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/*.m', '**/*.h', '*.xcodeproj/**', 'Libbox.xcframework/**') }}
          restore-keys: |
            archive-${{ runner.os }}-

      # --- Архивация ---
      - name: Archive app
        if: steps.cache-archive.outputs.cache-hit != 'true'
        run: |
          set -e

          xcodebuild archive \
            -scheme SFI \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/SFI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=""

      # --- Создание IPA ---
      - name: Create unsigned IPA
        run: |
          set -e

          APP=$(find build/SFI.xcarchive/Products/Applications -name "*.app" | head -n 1)

          if [ -z "$APP" ]; then
            echo "App not found"
            exit 1
          fi

          mkdir -p build/ipa/Payload
          cp -R "$APP" build/ipa/Payload/

          cd build/ipa
          zip -r SFI-${{ steps.singbox.outputs.sha }}-unsigned.ipa Payload

      # --- Артефакты ---
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SFI-unsigned
          path: build/ipa/*.ipa
          retention-days: 30

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: SFI-xcarchive
          path: build/SFI.xcarchive
          retention-days: 7

      - name: Done
        run: |
          echo "Build completed"
          ls -lh build/ipa/
